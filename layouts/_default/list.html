{{ define "main" }}
  <section class="mx-auto w-full max-w-5xl px-5 pb-16 md:px-8">
    <h1 class="font-display text-5xl leading-none md:text-6xl">{{ .Title }}</h1>
    <div class="mt-8 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      {{ range .Pages.ByDate.Reverse }}
        {{ partial "work-card.html" . }}
      {{ end }}
    </div>
  </section>
{{ end }}
