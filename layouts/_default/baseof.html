<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ $styles := resources.Get "css/main.css" | css.PostCSS }}
    {{ if hugo.IsProduction }}
      {{ $styles = $styles | minify | fingerprint "sha384" }}
    {{ end }}
    <link rel="stylesheet" href="{{ $styles.RelPermalink }}"{{ if hugo.IsProduction }} integrity="{{ $styles.Data.Integrity }}" crossorigin="anonymous"{{ end }}>
  </head>
  <body class="relative overflow-x-hidden">
    <div aria-hidden="true" class="pointer-events-none fixed -left-24 top-20 h-72 w-72 rounded-full bg-blue-300/30 blur-3xl"></div>
    <div aria-hidden="true" class="pointer-events-none fixed -right-20 top-40 h-80 w-80 rounded-full bg-sky-200/35 blur-3xl"></div>
    <header class="mx-auto w-full max-w-7xl px-5 pb-4 pt-6 md:px-8 md:pt-9">
      <div class="panel-soft flex items-center justify-between px-5 py-4 md:px-6">
        <a class="link-hover inline-flex items-center" href="{{ "/" | relURL }}" aria-label="{{ .Site.Title }}">
          {{ partial "logo.html" . }}
          <span class="sr-only">{{ .Site.Title }}</span>
        </a>
        <p class="meta-chip">modern visual portfolio</p>
      </div>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
