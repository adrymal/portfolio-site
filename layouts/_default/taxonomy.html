{{ define "main" }}
  <section class="mx-auto w-full max-w-4xl px-5 pb-16 md:px-8">
    <h1 class="font-display text-5xl leading-none md:text-6xl">{{ .Title }}</h1>
    <ul class="mt-8 space-y-3">
      {{ range .Pages }}
        <li>
          <a class="link-hover text-lg" href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
